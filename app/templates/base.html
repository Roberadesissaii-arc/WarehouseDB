<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>{% block title %}WarehouseDB{% endblock %}</title>
  <meta name="theme-color" content="#15130f" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black" />
  <link rel="manifest" href="{{ url_for('static', filename='manifest.webmanifest') }}" />
  <link rel="apple-touch-icon" href="{{ url_for('static', filename='icons/apple-touch-icon.png') }}" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Archivo:ital,wght@0,600;0,700;0,800;0,900;1,800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/base.css') }}" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/components.css') }}" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/layout.css') }}" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/board.css') }}" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/pages.css') }}" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/responsive.css') }}" />
</head>
<body data-warehouse-user="{{ current_user|default('', true) }}">
  {% include "_icons.html" %}
  {% block body %}{% endblock %}
  <div id="fleet-alert-stack" class="fleet-alert-stack" aria-live="assertive"></div>
  <div id="toast" class="toast hidden"></div>
  <script type="module" src="{{ url_for('static', filename='js/core/masthead.js') }}"></script>
  {% block scripts %}{% endblock %}
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => navigator.serviceWorker.register("/sw.js").catch(() => {}));
    }
  </script>
</body>
</html>
